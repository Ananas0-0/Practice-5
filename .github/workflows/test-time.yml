name: Test /time endpoint

on:
  push:
    branches-ignore:
      - 'main'
      - 'dev'
  pull_request:
    branches:
      - 'dev'

jobs:
  test:
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Setup Python virtual environment
        run: |
          python3 -m venv venv
          source venv/bin/activate
          python --version
          pip install --upgrade pip
          pip install flask requests
      
      - name: Run Flask app in background
        run: |
          source venv/bin/activate
          python app.py &
          sleep 3
      
      - name: Test /time endpoint
        run: |
          source venv/bin/activate
          response=$(curl -s http://localhost:5000/time)
          echo "Response: $response"
          if echo "$response" | grep -q '"time":0'; then
            echo "Test FAILED: time is 0"
            exit 1
          else
            echo "Test PASSED"
          fi
      
      - name: Stop app
        run: pkill -f "python app.py" || true
      
      - name: Test /metrics endpoint
        run: |
          source venv/bin/activate
          python -m unittest test.test_metrics