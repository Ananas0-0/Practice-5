name: Test /time endpoint

on:
  push:
    branches-ignore:
      - 'main'
      - 'dev'
  pull_request:
    branches:
      - 'dev'

jobs:
  test:
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      # Убрать actions/setup-python, использовать системный Python
      - name: Install dependencies
        run: |
          # Убедиться, что Python 3 установлен
          python3 --version
          pip3 install -r requirements.txt || pip install -r requirements.txt
          pip3 install requests || pip install requests
      
      - name: Run Flask app in background
        run: |
          python3 app.py &
          sleep 3
      
      - name: Run tests
        run: python3 -m unittest discover test